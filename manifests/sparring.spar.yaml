# The v2 SPARRING Resolver as a Rapier pipeline — the port of /spar.
#
#   author -> cross_review -> anchored_fix -> definitiveness_gate -> citation_gate
#
# Cross-vendor is automatic (V4): the author runs on whatever the `author` role
# names below; the reviewer and gate auto-pick a DISTINCT available vendor for
# genuine cross-vendor independence. Swap the author's vendor to anything
# (anthropic/openai/gemini/xai/…) and the rest follows — no Anthropic required.
# With only one vendor available, the reviewer/gate degrade honestly to
# single-vendor (cross_vendor:false) rather than going unchecked.
#
# Pin the reviewer/gate's second vendor explicitly with `reviewer_vendor:` /
# `second_vendor:` if you don't want auto-selection.
name: spar
pipeline:
  - stage: author
    roles:
      author: { vendor: anthropic, model: claude-opus-4-8 }

  - stage: cross_review
    config: {}             # reviewer_vendor: xai   # optional: pin the second vendor

  - stage: anchored_fix
    roles:
      author: { vendor: anthropic, model: claude-opus-4-8 }

  - stage: definitiveness_gate
    config: {}             # second_vendor: gemini  # optional: pin the gate's second vendor

  - stage: citation_gate
    config:
      judge: false         # set true to also run the dual-substrate supports-claim judge
